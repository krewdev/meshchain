<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c1424"/>
      <stop offset="1" stop-color="#03060c"/>
    </linearGradient>
    <linearGradient id="circleBorder" x1="16" y1="16" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#34d399"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="28" y1="32" x2="100" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Circle Badge -->
  <circle cx="64" cy="64" r="58" fill="url(#bgGrad)" stroke="url(#circleBorder)" stroke-width="4.5"/>
  <circle cx="64" cy="64" r="51" stroke="rgba(34, 211, 238, 0.2)" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- Bubble Letter 'M' -->
  <g filter="url(#glow)">
    <path d="M 32 84 V 44 C 32 34, 46 34, 50 40 L 64 58 L 78 40 C 82 34, 96 34, 96 44 V 84 C 96 94, 84 94, 84 84 V 56 L 64 72 L 44 56 V 84 C 44 94, 32 94, 32 84 Z" fill="url(#bubbleGrad)" stroke="#03060c" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- Specular Bubble Highlights -->
  <ellipse cx="40" cy="44" rx="3" ry="5" fill="#ffffff" opacity="0.65" transform="rotate(-15 40 44)"/>
  <ellipse cx="88" cy="44" rx="3" ry="5" fill="#ffffff" opacity="0.65" transform="rotate(15 88 44)"/>
  <circle cx="64" cy="63" r="2.5" fill="#ffffff" opacity="0.55"/>
</svg>
