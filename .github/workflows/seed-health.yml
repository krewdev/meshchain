name: Public seed health

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  health:
    name: Seed HTTP/HTTPS/peers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run status_public_seed.sh
        run: |
          chmod +x scripts/status_public_seed.sh
          ./scripts/status_public_seed.sh

  e2e:
    name: Public join → faucet e2e
    runs-on: ubuntu-latest
    needs: health
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Public e2e (join → faucet)
        run: |
          cargo build -p mesh -q
          chmod +x scripts/test_public_e2e.sh
          ./scripts/test_public_e2e.sh
